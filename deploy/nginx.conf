# ============================================
# 美股 AI 交易助手 - Nginx 配置模板
# 架构: SPA 静态资源走 nginx + /api & /docs 反代到 FastAPI (gunicorn:8000)
# ============================================
# 部署位置: /etc/nginx/sites-available/stock-ai
# 启用方式: ln -sf /etc/nginx/sites-available/stock-ai /etc/nginx/sites-enabled/
# 应用步骤: nginx -t && systemctl reload nginx
# 注意: 部署前需要把 YOUR_DOMAIN 替换为实际域名（首次配置或 certbot 申请 SSL 后会自动改）
# ============================================

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # 前端 SPA 构建产物根目录
    root /opt/stock-ai-assistant/frontend/dist;
    index index.html;

    # 后端 API 反代
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 飞书 webhook 可能发送较大的消息体
        client_max_body_size 10M;

        # 超时设置（回测等耗时操作）
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # FastAPI 自带的 Swagger / ReDoc / OpenAPI schema
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vite 构建产物（带 hash），可长期强缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback：所有未匹配路径都返回 index.html，由 React Router 接管
    location / {
        try_files $uri $uri/ /index.html;
    }
}
